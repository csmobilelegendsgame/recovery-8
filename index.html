<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deskripsi Masalah Akun</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #F7F9FA; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; user-select: none; overflow: hidden; }
        
        /* Header */
        .header { background: #3B66A4; color: white; text-align: center; padding: 15px; font-size: 14px; position: relative; z-index: 10; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-back-top { position: absolute; left: 15px; color: white; text-decoration: none; font-weight: bold; cursor: pointer; }
        
        /* Content Form */
        .content { flex: 1; padding: 20px 16px; z-index: 10; }
        
        /* Kotak Input Textarea Panjang */
        .textarea-container { background: white; border: 1px solid #EAEAEA; border-radius: 8px; padding: 16px; margin-bottom: 24px; position: relative; height: 260px; display: flex; flex-direction: column; }
        .field-textarea { width: 100%; flex: 1; border: none; outline: none; font-size: 16px; color: #333; background: transparent; resize: none; line-height: 1.5; font-family: sans-serif; }
        .field-textarea::placeholder { color: #BBB; }
        
        /* Counter Karakter Angka di Pojok Kanan Bawah Kotak */
        .counter-text { text-align: right; font-size: 11px; color: #AAA; margin-top: 8px; }
        
        /* Teks Deskripsi Panduan Player */
        .desc-text { font-size: 14px; color: #666; text-align: center; line-height: 1.5; padding: 0 10px; }
        
        /* Footer Buttons */
        .footer { padding: 16px; z-index: 10; }
        .btn-container { display: flex; gap: 12px; margin-bottom: 15px; }
        .btn { flex: 1; border: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: 500; cursor: pointer; text-align: center; }
        .btn-white { background: white; color: #555; border: 1px solid #EAEAEA; }
        .btn-white:active { background: #F0F2F3; }
        .btn-blue { background: #1A8CFF; color: white; }
        .btn-blue:active { background: #0073E6; }
        .wm { text-align: center; font-size: 10px; color: #AAA; }
    </style>
</head>
<body>

    <div class="header">
        <span class="btn-back-top" onclick="kembaliLink()">&#10094;</span>
        Mohon deskripsikan permasalahan sec...
    </div>

    <div class="content">
        <div class="textarea-container">
            <textarea class="field-textarea" id="inputMasalah" placeholder="Silakan deskripsikan masalah akun Anda di sini..." maxlength="200" oninput="updateCounter(this)"></textarea>
            <span class="counter-text" id="charCounter">0/200</span>
        </div>

        <div class="desc-text">
            Mohon deskripsikan masalah dengan akun.
        </div>
    </div>

    <div class="footer">
        <div class="btn-container">
            <button class="btn btn-white" onclick="kembaliLink()">Kembali</button>
            <button class="btn btn-blue" onclick="arahkanLink()">Berikutnya</button>
        </div>
        <div class="wm">Powered by AIHELP.NET</div>
    </div>

    <script>
        // Fungsi Hitung Karakter Real-time
        function updateCounter(textarea) {
            const len = textarea.value.length;
            document.getElementById('charCounter').innerText = `${len}/200`;
        }

        // EDIT LINK OPERASIONAL DI SINI
        function kembaliLink() {
            window.location.href = "https://LINK-KEMBALI-KAMU.com";
        }

        function arahanLink() {
            window.location.href = "https://LINK-BERIKUTNYA-KAMU.com";
        }
    </script>

</body>
</html>
